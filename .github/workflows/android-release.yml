name: Android Release AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;27.1.12297006" "cmake;3.22.1"

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Restore upload keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p credentials/android
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > credentials/android/keystore.jks

      - name: Build signed app bundle
        env:
          NODE_ENV: production
          EXPO_PUBLIC_API_PROFILE: production
          EXPO_PUBLIC_REVENUECAT_ANDROID_API_KEY: ${{ secrets.EXPO_PUBLIC_REVENUECAT_ANDROID_API_KEY }}
          EXPO_PUBLIC_REVENUECAT_ENTITLEMENT_ID: Physics AI Pro
          EXPO_PUBLIC_REVENUECAT_MONTHLY_PRODUCT_ID: monthly
          EXPO_PUBLIC_REVENUECAT_YEARLY_PRODUCT_ID: yearly
          MYAPP_UPLOAD_STORE_FILE: credentials/android/keystore.jks
          MYAPP_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          MYAPP_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew bundleRelease -PreactNativeArchitectures=arm64-v8a,armeabi-v7a --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: physics-ai-release-aab
          path: frontend/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
